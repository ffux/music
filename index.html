<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      display: block;
      opacity: 0.9;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.1rem;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">♫</span>
    <h1>Music</h1>
    <p>Coming soon</p>
  </div>
</body>
</html>
